{% extends "layouts/base.html" %}

{% block title %}Contact | TechStore{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow border-0">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Contact Us
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label>Name</label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter your name">

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Enter your email">

                        </div>

                        <div class="mb-3">

                            <label>Subject</label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Subject">

                        </div>

                        <div class="mb-4">

                            <label>Message</label>

                            <textarea
                                class="form-control"
                                rows="6"
                                placeholder="Write your message..."></textarea>

                        </div>

                        <button
                            class="btn btn-primary w-100">

                            Send Message

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
