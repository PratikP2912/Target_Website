{% extends "layouts/base.html" %}

{% block title %}Register | TechStore{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">

                        Create Your TechStore Account

                    </h2>

                    <form method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Full Name</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="full_name"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Username</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="username"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Email</label>

                                <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Phone</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="phone">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>Address</label>

                            <input
                                type="text"
                                class="form-control"
                                name="address">

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label>City</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="city">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>Country</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="country">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>Postal Code</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="postal_code">

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Password</label>

                                <input
                                    type="password"
                                    class="form-control"
                                    name="password"
                                    required>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label>Confirm Password</label>

                                <input
                                    type="password"
                                    class="form-control"
                                    name="confirm_password"
                                    required>

                            </div>

                        </div>

                        <button
                            class="btn btn-success w-100">

                            Create Account

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        Already have an account?

                        <a href="{{ url_for('auth.login') }}">

                            Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
